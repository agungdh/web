{#include main.html}
{#title}Edit Todo{/title}

<div class="row">
  <div class="col-md-8 col-lg-6">

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Edit Todo #{todo.id}</h3>
      </div>
      <div class="card-body">
        {#form uri:Todos.update(todo.id)}
          <div class="mb-3">
            <label for="task" class="form-label">Task</label>
            <input type="text" name="task" id="task" class="form-control {#ifError 'task'}is-invalid{/ifError}" value="{todo.task}" required/>
            {#ifError 'task'}
              <div class="invalid-feedback">
                {#error 'task'/}
              </div>
            {/ifError}
          </div>
          <div class="mb-3">
            <label class="form-label d-block">Status</label>
            {#if todo.completed}
              <span class="badge text-bg-success">Done since {todo.completed.since}</span>
            {#else}
              <span class="badge text-bg-warning">Pending</span>
            {/if}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Save
            </button>
            <a href="{uri:Todos.todos}" class="btn btn-secondary">
              <i class="bi bi-x-lg"></i> Cancel
            </a>
          </div>
        {/form}
      </div>
    </div>

  </div>
</div>
{/include}
