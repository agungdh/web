{#include admin.html}
{#title}Tags{/title}

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="card-title mb-0">Tags</h5>
    <a href="{uri:Tags.newTag}" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg"></i> New Tag
    </a>
  </div>
  <div class="card-body p-0">
    <table class="table table-striped table-hover mb-0">
      <thead>
        <tr>
          <th style="width: 10px">#</th>
          <th>Name</th>
          <th>Slug</th>
          <th style="width: 120px">Actions</th>
        </tr>
      </thead>
      <tbody>
        {#for tag in tags}
        <tr x-data="{ open: false }">
          <td>{tag.id}</td>
          <td><span class="badge text-bg-secondary">{tag.name}</span></td>
          <td><code>{tag.slug}</code></td>
          <td>
            <div class="btn-group btn-group-sm">
              <a href="{uri:Tags.edit(tag.id)}" class="btn btn-outline-primary" title="Edit">
                <i class="bi bi-pencil"></i>
              </a>
              <button type="button" class="btn btn-outline-danger" @click="open = true" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </div>

            <template x-teleport="body">
              <div class="modal-backdrop fade" :class="open ? 'show' : ''" :style="open ? 'display:block' : 'display:none'" style="background:rgba(0,0,0,0.5)"></div>
              <div class="modal fade" :class="open ? 'show' : ''" :style="open ? 'display:block' : 'display:none'" tabindex="-1">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title">Confirm Delete</h5>
                      <button type="button" class="btn-close" @click="open = false"></button>
                    </div>
                    <div class="modal-body">
                      <p>Are you sure you want to delete tag <strong>"{tag.name}"</strong>?</p>
                      <p class="text-muted mb-0">This will soft-delete the tag.</p>
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" @click="open = false">Cancel</button>
                      {#form uri:Tags.delete(tag.id)}
                        <button type="submit" class="btn btn-danger">Delete</button>
                      {/form}
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </td>
        </tr>
        {/for}
        {#if tags.isEmpty}
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
            No tags yet.
          </td>
        </tr>
        {/if}
      </tbody>
    </table>
  </div>
</div>
{/include}
