<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{#insert title/} — My Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {#insert moreStyles/}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a2e; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    .header { border-bottom: 1px solid #eee; background: rgba(255,255,255,0.97); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
    .header .inner { max-width: 760px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .header .brand { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.3px; }
    .header nav { display: flex; gap: 1.5rem; align-items: center; }
    .header nav a { font-size: 0.875rem; font-weight: 500; color: #555; transition: color 0.15s; }
    .header nav a:hover { color: #000; }
    .header nav .admin-link { color: #aaa; font-size: 0.8rem; }

    .content { max-width: 740px; margin: 0 auto; padding: 3rem 1.5rem; }

    .post-card { padding: 2rem 0; border-bottom: 1px solid #f0f0f0; }
    .post-card:last-child { border-bottom: none; }
    .post-card h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 0.5rem; line-height: 1.35; }
    .post-card h2 a { color: #1a1a2e; }
    .post-card h2 a:hover { color: #2563eb; }
    .post-card .meta { font-size: 0.85rem; color: #888; margin-bottom: 0.75rem; }
    .post-card .excerpt { color: #444; font-size: 0.95rem; line-height: 1.7; margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .post-card .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .post-card .tags a { background: #f3f4f6; color: #555; padding: 0.2em 0.7em; border-radius: 999px; font-size: 0.78rem; font-weight: 500; transition: all 0.15s; }
    .post-card .tags a:hover { background: #2563eb; color: #fff; }
    .post-card .readmore { display: inline-block; margin-top: 0.75rem; font-size: 0.85rem; font-weight: 600; color: #2563eb; }
    .post-card .readmore:hover { color: #1d4ed8; }

    .article-header { margin-bottom: 2.5rem; }
    .article-header h1 { font-size: 2.25rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.25; margin-bottom: 0.75rem; }
    .article-header .meta { color: #888; font-size: 0.9rem; }
    .article-header .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .article-header .tags a { background: #f3f4f6; color: #555; padding: 0.3em 0.8em; border-radius: 999px; font-size: 0.8rem; font-weight: 500; transition: all 0.15s; }
    .article-header .tags a:hover { background: #2563eb; color: #fff; }

    .article-content { font-size: 1.08rem; color: #2d2d3d; }
    .article-content h1, .article-content h2, .article-content h3 { font-weight: 700; margin: 2rem 0 0.75rem; letter-spacing: -0.3px; }
    .article-content h1 { font-size: 1.75rem; }
    .article-content h2 { font-size: 1.4rem; }
    .article-content h3 { font-size: 1.15rem; }
    .article-content p { margin-bottom: 1.25rem; }
    .article-content a { color: #2563eb; text-decoration: underline; }
    .article-content ul, .article-content ol { margin: 1rem 0; padding-left: 1.5rem; }
    .article-content li { margin-bottom: 0.4rem; }
    .article-content pre { background: #f8f9fb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.25rem; overflow-x: auto; margin: 1.25rem 0; font-size: 0.9rem; line-height: 1.6; }
    .article-content code { font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace; font-size: 0.88em; }
    .article-content p code { background: #f3f4f6; padding: 0.15em 0.45em; border-radius: 4px; }
    .article-content pre code { background: none; padding: 0; }
    .article-content blockquote { border-left: 3px solid #2563eb; padding: 0.5rem 1.25rem; color: #666; margin: 1.5rem 0; font-style: italic; }
    .article-content img { max-width: 100%; border-radius: 8px; margin: 1.25rem 0; }
    .article-content hr { border: none; border-top: 1px solid #e5e7eb; margin: 2.5rem 0; }
    .article-content table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; }
    .article-content th, .article-content td { border: 1px solid #e5e7eb; padding: 0.65rem 1rem; text-align: left; }
    .article-content th { background: #f8f9fb; font-weight: 600; }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 2.5rem 0; }

    .btn-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; font-weight: 600; color: #555; padding: 0.5rem 0; transition: color 0.15s; }
    .btn-back:hover { color: #000; }

    .page-title { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2rem; }

    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .tag-cloud a { background: #f3f4f6; color: #555; padding: 0.45em 1em; border-radius: 999px; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
    .tag-cloud a:hover { background: #2563eb; color: #fff; }

    .empty { text-align: center; padding: 4rem 1rem; color: #999; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty h3 { font-weight: 600; margin-bottom: 0.5rem; color: #888; }
    .empty p { color: #aaa; }

    .footer { text-align: center; padding: 2rem 1.5rem; color: #bbb; font-size: 0.8rem; border-top: 1px solid #f0f0f0; margin-top: 3rem; }

    @media (max-width: 600px) {
      .content { padding: 2rem 1rem; }
      .article-header h1 { font-size: 1.6rem; }
      .article-content { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="inner">
    <a href="{uri:Blog.index}" class="brand">My Blog</a>
    <nav>
      <a href="{uri:Blog.index}">Home</a>
      <a href="{uri:Blog.tags}">Tags</a>
      <a href="{uri:Posts.index}" class="admin-link">Admin</a>
    </nav>
  </div>
</header>

<main class="content">
  {#insert /}
</main>

<footer class="footer">
  &copy; 2025 My Blog &mdash; Powered by Quarkus
</footer>

{#insert moreScripts/}
</body>
</html>
