<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{#insert title/} — Todo App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  {#insert moreStyles/}
</head>
<body class="layout-fixed">
  <div class="app-wrapper">

    <nav class="app-header navbar navbar-expand bg-primary">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="navbar-text text-white">Quarkus Renarde</span>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar shadow-sm">
      <div class="sidebar-brand">
        <a href="{uri:Todos.index}" class="brand-link text-decoration-none">
          <span class="brand-text fw-bold">Todo App</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu" data-accordion="false">
            <li class="nav-item">
              <a href="{uri:Todos.index}" class="nav-link">
                <i class="nav-icon bi bi-house"></i>
                <p>Home</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="{uri:Todos.todos}" class="nav-link">
                <i class="nav-icon bi bi-list-check"></i>
                <p>Todos</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content">
        <div class="container-fluid pt-3">
          {#insert /}
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="float-end d-none d-sm-inline">Powered by Quarkus &amp; Renarde</div>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
  {#insert moreScripts/}
</body>
</html>
