<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <meta name="color-scheme" content="light dark"/>
  <title>{#insert title/} — Admin</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2/dist/easymde.min.css"/>
  {#insert moreStyles/}
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary" x-data="{ sidebarOpen: true }">
  <div class="app-wrapper">

    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#" role="button" @click.prevent="sidebarOpen = !sidebarOpen">
              <i class="bi bi-list"></i>
            </a>
          </li>
          <li class="nav-item d-none d-md-block">
            <a href="{uri:Blog.index}" class="nav-link">&larr; Blog</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="navbar-text">Blog Admin</span>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark" x-show="sidebarOpen" x-transition.opacity>
      <div class="sidebar-brand">
        <a href="{uri:Posts.index}" class="brand-link">
          <span class="brand-text fw-light">Admin Panel</span>
        </a>
      </div>
      <div class="sidebar-wrapper" style="overflow-y:auto;max-height:calc(100vh - 3.5rem);">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column" role="navigation">
            <li class="nav-item">
              <a href="{uri:Posts.index}" class="nav-link">
                <i class="nav-icon bi bi-file-earmark-text"></i>
                <p>Posts</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="{uri:Tags.index}" class="nav-link">
                <i class="nav-icon bi bi-tags"></i>
                <p>Tags</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="{uri:Blog.index}" class="nav-link">
                <i class="nav-icon bi bi-house"></i>
                <p>Back to Blog</p>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h3 class="mb-0">{#insert title/}</h3>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-end">
                <li class="breadcrumb-item"><a href="{uri:Posts.index}">Admin</a></li>
                <li class="breadcrumb-item active" aria-current="page">{#insert title/}</li>
              </ol>
            </div>
          </div>
        </div>
      </div>
      <div class="app-content">
        <div class="container-fluid">
          {#insert /}
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="float-end d-none d-sm-inline">Anything you want</div>
      <strong>Copyright &copy; 2014-2026&nbsp;<a href="https://adminlte.io" class="text-decoration-none">AdminLTE.io</a>.</strong>
      All rights reserved.
    </footer>

  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde@2/dist/easymde.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('textarea[data-markdown]').forEach(function(el) {
        new EasyMDE({ element: el });
      });
    });
  </script>
  {#insert moreScripts/}
</body>
</html>
