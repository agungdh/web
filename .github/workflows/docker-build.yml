name: Docker build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-native:
    strategy:
      matrix:
        arch:
          - x86-64-v2
          - x86-64-v3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Mandrel (GraalVM) for JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Build native executable (${{ matrix.arch }})
        run: |
          ./mvnw package -Dnative -DskipTests \
            -Dquarkus.native.additional-build-args="-march=${{ matrix.arch }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.distroless
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.arch }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}-${{ matrix.arch }}
